name: Documenter
# Cost-disciplined (matches CLAUDE.md): NO push-to-main trigger. A single cheap
# Linux job. PR builds the site as a check (no deploy); version tags deploy
# release docs; workflow_dispatch builds + deploys the dev docs on demand.
on:
  pull_request:
    branches: [main]
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      statuses: write
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Instantiate docs environment
        run: |
          julia --project=docs -e '
            using Pkg
            Pkg.develop(PackageSpec(path = pwd()))
            Pkg.instantiate()'
      - name: Build (and deploy on tag / dispatch)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
        run: julia --project=docs docs/make.jl
