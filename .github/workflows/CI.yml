name: CI
# Cost-disciplined: PR + manual only, Linux only. Add macOS/Windows + a `push`
# trigger to `main` only right before a tagged release / CRAN-equivalent.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_p10k:
        description: "Include p=10000 in the multi-shape scaling sweep (#16, minutes-scale)"
        required: false
        default: "false"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['1.10', '1']
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1

  # Engine-quality Q-gate #16: multi-shape (balanced + caterpillar) O(p) scaling
  # sweep. NOT per-PR (the p=10k cell is minutes-scale) — manual dispatch only.
  # Default grid is {100, 1000}; set run_p10k=true to add the p=10k cell.
  scaling-sweep:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - name: Run multi-shape scaling gate (#16)
        env:
          DRM_QGATE_PS: ${{ github.event.inputs.run_p10k == 'true' && '100,1000,10000' || '100,1000' }}
          DRM_QGATE_SHAPES: balanced,caterpillar
          DRM_QGATE_NREP: '4'
        run: julia --project=. bench/run_scaling.jl
      - name: Upload scaling report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qgate-multishape-scaling
          path: report/qgate-multishape-scaling.md
